<div class="p-6 bg-white dark:bg-slate-900 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 flex items-center justify-between">
  <div>
    <p class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">Progression Globale</p>
    <p class="text-xs text-slate-400 mt-1">Moyenne de tous les projets</p>
  </div>

  <div class="relative flex items-center justify-center w-20 h-20">
    <svg class="w-full h-full transform -rotate-90">
      <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="6" fill="transparent" class="text-slate-100 dark:text-slate-800" />
      <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="6" fill="transparent" stroke-linecap="round"
        [style.stroke-dasharray]="213.6"
        [style.stroke-dashoffset]="213.6 - (213.6 * getGlobalProgress() / 100)"
        class="text-indigo-600 dark:text-indigo-400 transition-all duration-1000" />
    </svg>
    <span class="absolute text-sm font-bold text-slate-800 dark:text-white">
      {{ getGlobalProgress() | number:'1.0-0' }}%
    </span>
  </div>
</div>
