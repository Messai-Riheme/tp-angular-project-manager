<div class="space-y-4">
  @for (project of projects; track project.name; let i = $index) {
    <div class="bg-white shadow rounded p-4 border border-gray-100">
      
      <div class="flex justify-between items-center cursor-pointer" (click)="toggleProjet(i)">
        <div>
          <h2 class="text-xl font-bold text-gray-800">{{ project.name }}</h2>
          <p class="text-gray-500 text-sm">{{ project.description }}</p>
        </div>
        
        <div class="flex items-center space-x-3">
          <span class="text-xs font-bold px-2 py-1 bg-gray-100 rounded">{{ project.status }}</span>
          
          <svg xmlns="http://www.w3.org/2000/svg" 
               class="h-6 w-6 transition-transform duration-300"
               [class.rotate-180]="projectOuvert === i"
               fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      @if (projectOuvert === i) {
        <div class="mt-4 pt-4 border-t border-dashed animate-fade-in">
          <app-task-list [tasks]="project.tasks"></app-task-list>
        </div>
      }
      
    </div>
  }
</div>
