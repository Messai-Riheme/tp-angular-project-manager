<input 
  [(ngModel)]="searchTerm"
  placeholder="Rechercher un projet"
  class="border p-2 rounded w-full mb-4" />

<div class="space-y-4">

  @for (project of filteredProjects; track project.name; let i = $index) {
    
    <div [@itemAnim] class="bg-white shadow rounded p-4 border border-gray-100">

      <div class="flex justify-between items-center cursor-pointer" (click)="toggleProjet(i)">
        <div>
          <h2 class="text-xl font-bold text-gray-800">{{ project.name }}</h2>
          <p class="text-gray-500 text-sm">{{ project.description }}</p>
        </div>

        <div class="flex items-center space-x-3">
          <button 
            class="bg-blue-500 text-white px-3 py-1 rounded text-xs"
            (click)="selectProject(project); $event.stopPropagation()">
            Voir détails
          </button>

          <button (click)="deleteProject(i); $event.stopPropagation()" class="text-red-500">
            🗑️
          </button>
        </div>
      </div>

      @if (projectOuvert === i) {
        <div class="mt-4 pt-4 border-t border-dashed">
          <app-task-list [tasks]="project.tasks"></app-task-list>
        </div>
      }

    </div>
  } @if (selectedProject) {
    <app-project-detail [project]="selectedProject"></app-project-detail>
  }

  @if (notification) {
    <div [@toastAnim] class="fixed bottom-5 right-5 bg-green-600 text-white px-6 py-3 rounded shadow-lg z-50">
      {{ notification }}
    </div>
  }

</div>
