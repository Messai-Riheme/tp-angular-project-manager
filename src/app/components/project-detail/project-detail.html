@if (project) {
<div class="mt-6 p-6 bg-gray-100 rounded shadow">

  <h2 class="text-2xl font-bold">{{ project.name }}</h2>
  <p class="text-gray-600 mb-4">{{ project.description }}</p>

  <p class="mb-2">
    <strong>Statut global :</strong> 
    <span class="italic text-blue-600">{{ project.status }}</span>
  </p>

  <div class="mt-4">
    <div class="w-full bg-gray-300 rounded h-4 overflow-hidden">
      <div 
        class="bg-green-500 h-4 transition-all duration-500 ease-in-out"
        [style.width.%]="getProgress()">
      </div>
    </div>
    <p class="text-sm mt-2 font-semibold">
      Progression : {{ getProgress() | number:'1.0-0' }} %
    </p>
  </div>

  <hr class="my-6 border-gray-300">

  <app-task-list 
    [tasks]="project.tasks"
    (statusChanged)="updateTaskStatus($event)">
  </app-task-list>

</div>
}
