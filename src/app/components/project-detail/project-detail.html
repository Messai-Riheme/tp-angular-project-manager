@if (project) {
<div class="mt-6 p-6 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 transition-colors">

  <div class="flex justify-between items-start mb-4">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 dark:text-white">{{ project.name }}</h2>
      <p class="text-slate-600 dark:text-slate-400 text-sm italic">
        Créé {{ project.createdAt | friendlyDate }}
      </p>
      <p class="mt-2 text-slate-700 dark:text-slate-300">{{ project.description }}</p>
    </div>
    
    <app-status-badge [status]="project.status"></app-status-badge>
  </div>

  <div class="mt-6 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700">
    <div class="flex justify-between items-center mb-2">
      <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Progression du projet</span>
      <span class="text-sm font-bold text-indigo-600 dark:text-indigo-400">
        {{ getProgress() | number:'1.0-0' }} %
      </span>
    </div>
    
    <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-3 overflow-hidden">
      <div 
        class="bg-green-500 h-full transition-all duration-700 ease-out shadow-[0_0_10px_rgba(34,197,94,0.4)]"
        [style.width.%]="getProgress()">
      </div>
    </div>
  </div>

  <hr class="my-6 border-slate-200 dark:border-slate-800">

  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-200">Liste des tâches</h3>
    <span class="text-xs text-slate-500 dark:text-slate-400">{{ project.tasks?.length }} tâches au total</span>
  </div>
  
  <app-task-list 
    [tasks]="project.tasks"
    (statusChanged)="updateTaskStatus($event)">
  </app-task-list>

</div>
}
