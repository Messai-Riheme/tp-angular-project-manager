<div class="space-y-4">
  <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-200 dark:border-slate-800">
    <label class="text-xs font-bold uppercase text-slate-500 tracking-wider">Priorité :</label>
    <select 
      [(ngModel)]="priorityFilter"
      class="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs font-bold rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
      <option value="TOUTES">Toutes les tâches</option>
      <option value="HAUTE">🔴 Haute</option>
      <option value="MOYENNE">🟠 Moyenne</option>
      <option value="BASSE">🟢 Basse</option>
    </select>
  </div>

  <div class="space-y-2">
    @for (task of filteredTasks; track task.name; let i = $index) {
      <div class="flex items-center justify-between p-4 rounded-xl border bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 transition-all">
        
        <div class="flex flex-col gap-1">
          <span class="font-semibold text-slate-800 dark:text-slate-100">{{ task.name }}</span>
          
          <span class="text-[10px] font-black uppercase tracking-widest" 
                [style.color]="task.priority | priorityColor">
            {{ task.priority }}
          </span>
        </div>

        <div class="flex items-center gap-3">
          <button (click)="changeStatus(i)" 
                  class="text-[10px] font-bold uppercase px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300">
            Status
          </button>

          <span class="text-[10px] font-bold uppercase px-3 py-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-800/50">
            {{ task.status | statusEmoji }} {{ task.status }}
          </span>
        </div>
      </div>
    }
  </div>
</div>
