<div class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
  
  <header class="p-4 flex justify-between items-center border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
    <h1 class="text-xl font-bold uppercase tracking-widest text-indigo-600 dark:text-indigo-400">
      {{ title() }}
    </h1>
    
    <button (click)="toggleDarkMode()" 
            class="flex items-center gap-2 px-4 py-2 rounded-full border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all font-medium">
      @if (isDarkMode()) {
        <span>☀️ Mode Clair</span>
      } @else {
        <span>🌙 Mode Sombre</span>
      }
    </button>
  </header>

  <main class="p-6">
    <app-project-list></app-project-list>
  </main>

  <router-outlet />
</div>
